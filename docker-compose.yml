services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: sentryphish
      POSTGRES_PASSWORD: sentryphish
      POSTGRES_DB: sentryphish
    ports: ["5432:5432"]
    volumes:
      - sentryphish_pgdata:/var/lib/postgresql/data
      - ./docker/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro
volumes:
  sentryphish_pgdata:
